version: "3.9"

services:
  frontend:
    build: 
      context: . 
      dockerfile: ./apps/front-end/Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/front-end:/app
      - /app/node_modules
    command: pnpm dev
    depends_on:
      - backend
      - db

  backend:
    build: 
      context: . 
      dockerfile: ./apps/back-end/Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    volumes:
      - ./apps/back-end:/app
      - /app/node_modules
    command: pnpm dev
    depends_on:
      - db

  db:
    image: postgis/postgis:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE}
      POSTGRES_HOST: ${DATABASE_HOST}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
